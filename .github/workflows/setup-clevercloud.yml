name: Setup Clever Cloud Infrastructure

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'yes' to confirm infrastructure creation"
        required: true
        default: "no"

jobs:
  setup:
    if: github.event.inputs.confirm == 'yes'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Clever Cloud CLI
        run: npm install -g clever-tools

      - name: Login to Clever Cloud
        env:
          CLEVER_TOKEN: ${{ secrets.CLEVER_TOKEN }}
          CLEVER_SECRET: ${{ secrets.CLEVER_SECRET }}
        run: clever login --token "$CLEVER_TOKEN" --secret "$CLEVER_SECRET"

      - name: Create Go backend application
        env:
          CLEVER_TOKEN: ${{ secrets.CLEVER_TOKEN }}
          CLEVER_SECRET: ${{ secrets.CLEVER_SECRET }}
          CLEVER_ORGANIZATION: ${{ secrets.CLEVER_ORGANIZATION }}
          GENEAO_PASSWORD: ${{ secrets.GENEAO_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GENEAO_TITLE: ${{ secrets.GENEAO_TITLE }}
          CLEVER_FRONT_URL: ${{ secrets.CLEVER_FRONT_URL }}
        run: |
          # Check if backend app already exists
          if clever applications list --org "$CLEVER_ORGANIZATION" 2>/dev/null | grep -q "geneao_backend"; then
            echo "geneao_backend already exists — skipping creation"
          else
            echo "Creating geneao_backend..."
            clever create geneao_backend --type go --org "$CLEVER_ORGANIZATION" --region par --alias backend
          fi
          clever link geneao_backend --org "$CLEVER_ORGANIZATION" --alias backend
          clever env set --alias backend APP_FOLDER backend
          clever env set --alias backend CC_GO_BUILD_TOOL gomod
          clever env set --alias backend CC_GO_PKG ./cmd/server
          clever env set --alias backend PORT 8080
          clever env set --alias backend GENEAO_PASSWORD "$GENEAO_PASSWORD"
          clever env set --alias backend JWT_SECRET "$JWT_SECRET"
          if [ -n "$GENEAO_TITLE" ]; then clever env set --alias backend GENEAO_TITLE "$GENEAO_TITLE"; fi
          if [ -n "$CLEVER_FRONT_URL" ]; then clever env set --alias backend ALLOWED_ORIGINS "$CLEVER_FRONT_URL"; fi

      - name: Create PostgreSQL add-on
        env:
          CLEVER_TOKEN: ${{ secrets.CLEVER_TOKEN }}
          CLEVER_SECRET: ${{ secrets.CLEVER_SECRET }}
          CLEVER_ORGANIZATION: ${{ secrets.CLEVER_ORGANIZATION }}
        run: |
          # Check if PostgreSQL addon already exists
          if clever addon list --org "$CLEVER_ORGANIZATION" 2>/dev/null | grep -q "geneao_db"; then
            echo "geneao_db already exists — skipping creation"
          else
            echo "Creating geneao_db..."
            clever addon create postgresql-addon geneao_db --org "$CLEVER_ORGANIZATION" --plan dev
          fi
          clever service link-addon --alias backend geneao_db

      - name: Map PostgreSQL env vars
        env:
          CLEVER_TOKEN: ${{ secrets.CLEVER_TOKEN }}
          CLEVER_SECRET: ${{ secrets.CLEVER_SECRET }}
        run: |
          PG_URI=$(clever env --alias backend | grep "^POSTGRESQL_ADDON_URI=" | cut -d= -f2- | tr -d '"')
          if [ -n "$PG_URI" ]; then
            clever env set --alias backend DATABASE_URL "$PG_URI"
            echo "DATABASE_URL set from POSTGRESQL_ADDON_URI"
          else
            echo "WARNING: POSTGRESQL_ADDON_URI not found — set DATABASE_URL manually"
          fi

      - name: Create Cellar (S3) add-on
        env:
          CLEVER_TOKEN: ${{ secrets.CLEVER_TOKEN }}
          CLEVER_SECRET: ${{ secrets.CLEVER_SECRET }}
          CLEVER_ORGANIZATION: ${{ secrets.CLEVER_ORGANIZATION }}
        run: |
          # Check if Cellar addon already exists
          if clever addon list --org "$CLEVER_ORGANIZATION" 2>/dev/null | grep -q "geneao_storage"; then
            echo "geneao_storage already exists — skipping creation"
          else
            echo "Creating geneao_storage..."
            clever addon create cellar-addon geneao_storage --org "$CLEVER_ORGANIZATION" --plan s
          fi
          clever service link-addon --alias backend geneao_storage

      - name: Map Cellar S3 env vars
        env:
          CLEVER_TOKEN: ${{ secrets.CLEVER_TOKEN }}
          CLEVER_SECRET: ${{ secrets.CLEVER_SECRET }}
        run: |
          CELLAR_HOST=$(clever env --alias backend | grep "^CELLAR_ADDON_HOST=" | cut -d= -f2- | tr -d '"')
          CELLAR_KEY=$(clever env --alias backend | grep "^CELLAR_ADDON_KEY_ID=" | cut -d= -f2- | tr -d '"')
          CELLAR_SECRET=$(clever env --alias backend | grep "^CELLAR_ADDON_KEY_SECRET=" | cut -d= -f2- | tr -d '"')
          if [ -n "$CELLAR_HOST" ] && [ -n "$CELLAR_KEY" ] && [ -n "$CELLAR_SECRET" ]; then
            clever env set --alias backend S3_ENDPOINT "https://$CELLAR_HOST"
            clever env set --alias backend S3_ACCESS_KEY "$CELLAR_KEY"
            clever env set --alias backend S3_SECRET_KEY "$CELLAR_SECRET"
            clever env set --alias backend S3_BUCKET "geneao"
            clever env set --alias backend S3_REGION "us-east-1"
            echo "S3 env vars set from Cellar addon"
          else
            echo "WARNING: Cellar env vars not found — set S3_* env vars manually"
          fi

      - name: Create static frontend application
        env:
          CLEVER_TOKEN: ${{ secrets.CLEVER_TOKEN }}
          CLEVER_SECRET: ${{ secrets.CLEVER_SECRET }}
          CLEVER_ORGANIZATION: ${{ secrets.CLEVER_ORGANIZATION }}
        run: |
          # Check if frontend app already exists
          if clever applications list --org "$CLEVER_ORGANIZATION" 2>/dev/null | grep -q "geneao_frontend"; then
            echo "geneao_frontend already exists — skipping creation"
          else
            echo "Creating geneao_frontend..."
            clever create geneao_frontend --type static-apache --org "$CLEVER_ORGANIZATION" --region par --alias frontend
          fi
          clever link geneao_frontend --org "$CLEVER_ORGANIZATION" --alias frontend
          clever env set --alias frontend APP_FOLDER dist

      - name: Summary
        run: |
          echo "Clever Cloud infrastructure created:"
          echo "  - geneao_backend (Go)"
          echo "  - geneao_frontend (Static)"
          echo "  - geneao_db (PostgreSQL dev)"
          echo "  - geneao_storage (Cellar/S3)"
          echo ""
          echo "Automated configuration:"
          echo "  - DATABASE_URL mapped from PostgreSQL addon"
          echo "  - S3_* env vars mapped from Cellar addon"
          echo "  - ALLOWED_ORIGINS set from CLEVER_FRONT_URL"
          echo "  - APP_FOLDER=dist on frontend"
          echo ""
          echo "Next step:"
          echo "  Deploy via 'Deploy to Clever Cloud' workflow"
